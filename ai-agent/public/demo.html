<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Widget Demo</title>
  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #eef4fb, #f8fbff);
      color: #1d2530;
      min-height: 100vh;
      padding: 2rem;
    }
    .demo-card {
      max-width: 900px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(26, 26, 26, 0.12);
      padding: 1.2rem;
      box-shadow: 0 18px 42px rgba(10, 20, 30, 0.12);
    }
    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <section class="demo-card">
    <h1>AI Agent Widget Demo</h1>
    <p>
      This page demonstrates the embeddable conversational agent. Ask questions about products,
      onboarding, support, or next steps.
    </p>
  </section>

  <div id="ai-agent-widget"></div>

  <script>
    window.AIAgentWidgetConfig = {
      apiBaseUrl: window.location.origin,
      agent: {
        name: "DIL Assistant",
        avatarUrl: "",
        welcomeMessage: "Hi, I am your DIL assistant. I can help with product guidance, support, and next steps."
      },
      theme: {
        mode: "auto",
        primaryColor: "#1f9dff"
      },
      labels: {
        inputPlaceholder: "Ask anything...",
        sendButton: "Send"
      }
    };
  </script>
  <script src="/widget.js" defer></script>
</body>
</html>
